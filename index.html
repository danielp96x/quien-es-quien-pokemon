<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>¿Quién es ese Pokémon?</title>

    <!-- Estilos -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================= -->
    <!-- BARRA SUPERIOR -->
    <!-- ========================================= -->

    <header class="top-bar">

        <h1>¿Quién es ese Pokémon?</h1>

        <div class="stats">

            <span>⏱️ <b id="tiempo">00:00</b></span>

            <span>❓ <b id="preguntas">0</b></span>

            <span>🃏 <b id="restantes">0</b></span>

        </div>

    </header>

    <!-- ========================================= -->
    <!-- CONTENIDO -->
    <!-- ========================================= -->

    <main>

        <!-- ============================== -->
        <!-- MODOS DE JUEGO -->
        <!-- ============================== -->

        <section class="selector">

            <label for="modoJuego">
                🎮 Modo de juego
            </label>

            <select id="modoJuego">

                <option value="todas">
                    🌍 Todas las generaciones
                </option>

                <option value="gen1">
                    🔴 Generación 1
                </option>

                <option value="gen2">
                    🔵 Generación 2
                </option>

                <option value="gen3">
                    🟢 Generación 3
                </option>

                <option value="gen4">
                    💎 Generación 4
                </option>

                <option value="gen5">
                    ⚫ Generación 5
                </option>

                <option value="gen6">
                    ✨ Generación 6
                </option>

                <option value="gen7">
                    🌞 Generación 7
                </option>

                <option value="gen8">
                    🗡️ Generación 8
                </option>

                <option value="gen9">
                    💜 Generación 9
                </option>

                <option value="legendarios">
                    ⭐ Legendarios
                </option>

                <option value="miticos">
                    ✨ Singulares / Míticos
                </option>

                <option value="pseudo">
                    🐉 Pseudolegendarios
                </option>

                <option value="ultraentes">
                    👽 Ultraentes
                </option>

                <option value="paradojas">
                    ⏳ Paradojas
                </option>

                <option value="eevee">
                    🌈 Eeveeluciones
                </option>

                <option value="iniciales">
                    🔥 Iniciales
                </option>

            </select>

        </section>

        <!-- ============================== -->
        <!-- BOTÓN -->
        <!-- ============================== -->

        <button id="nuevaPartida">

            🚀 Nueva partida

        </button>
        <button id="verEstadisticas">
    📊 Estadísticas
    
</button>

<button onclick="crearSala()">
    partidaMulti.sala={

    codigo:codigo,

    tablero:partidaActual.pokemonTablero,

    jugador1:null,

    jugador2:null

};
🎮 Crear partida

</button>

<button onclick="unirseSala()">
🔑 Unirse
</button>

<div id="seleccionMulti">

<h2>
🎮 Elige tu Pokémon
</h2>


<input 
id="buscarPokemonMulti"
placeholder="Buscar Pokémon">


<div id="listaPokemonMulti"></div>


</div>
        <!-- ============================== -->
        <!-- TABLERO -->
        <!-- ============================== -->

        <section
            id="tablero"
            aria-label="Tablero de Pokémon"
        >

            <!-- Se genera automáticamente -->

        </section>

        <!-- ============================== -->
        <!-- PREGUNTAS -->
        <!-- ============================== -->

        <section
            id="panelPreguntas"
            class="panel-preguntas"
        >

            <!-- JavaScript generará los botones -->

        </section>

        <!-- ============================== -->
        <!-- RESPUESTA -->
        <!-- ============================== -->

        <section id="respuesta">

            Selecciona una pregunta...

        </section>

    </main>

    <!-- ========================================= -->
    <!-- BASE DE DATOS -->
    <!-- ========================================= -->
<script src="js/storage.js"></script>

    <script src="data/color.js"></script>

    <script src="data/tipos.js"></script>

    <script src="data/generaciones.js"></script>

    <script src="data/modos.js"></script>

    <script src="data/preguntas.js"></script>

    <script src="data/pokedex.js"></script>

    <!-- Generaciones -->

    <script src="data/gen1.js"></script>

    <script src="data/gen2.js"></script>

    <script src="data/gen3.js"></script>

    <script src="data/gen4.js"></script>

    <script src="data/gen5.js"></script>

    <script src="data/gen6.js"></script>

    <script src="data/gen7.js"></script>

    <script src="data/gen8.js"></script>

    <script src="data/gen9.js"></script>

    <!-- Pokédex completa -->

    <script src="data/pokemon.js"></script>

    <!-- ========================================= -->
    <!-- MOTOR -->
    <!-- ========================================= -->

    <script src="js/game.js"></script>


</script>

    <script type="module" src="js/multiplayer.js"></script>

    <script src="js/filtros.js"></script>

    <script src="js/ui.js"></script>

    <script src="js/tiempos.js"></script>

    <!-- Inicio del juego -->

    <script src="script.js"></script>

</body>

</div>
</html>
window.crearSala = crearSala;
